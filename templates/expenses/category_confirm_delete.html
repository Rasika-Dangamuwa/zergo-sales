{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Category - Zergo Distributors{% endblock %}

{% block content %}
<div class="container-fluid px-3 px-md-4 py-3">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Delete Category</h5>
                </div>
                <div class="card-body">
                    <p>Are you sure you want to delete the category <strong>"{{ category.name }}"</strong>?</p>
                    <div class="alert alert-warning py-2">
                        <i class="fas fa-info-circle me-1"></i>This action cannot be undone.
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'expenses:category_list' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash me-1"></i>Delete
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
