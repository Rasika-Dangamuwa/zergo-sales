{% extends 'base.html' %}
{% load static %}

{% block title %}Set Route{% endblock %}

{% block extra_css %}
<style>
    .route-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
    }
    
    .route-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        padding: 30px;
        text-align: center;
    }
    
    .route-icon {
        font-size: 4em;
        color: #0d6efd;
        margin-bottom: 20px;
    }
    
    @media (max-width: 767px) {
        .route-container {
            margin: 20px auto;
            padding: 15px;
        }
        
        .route-card {
            padding: 20px;
        }
        
        .route-icon {
            font-size: 3em;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="route-container">
    <div class="route-card">
        <i class="fas fa-map-marked-alt route-icon"></i>
        <h4 class="mb-3">Set Your Route</h4>
        <p class="text-muted mb-4">
            Please enter the route(s) you worked on<br>
            <strong>{{ date|date:"F d, Y" }}</strong>
        </p>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" name="route" class="form-control form-control-lg" 
                       placeholder="e.g., Wattala & Sedawatta" required autofocus>
                <div class="form-text">You can change this later if needed</div>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-check me-2"></i>Continue to Report
                </button>
                <a href="{% url 'sales:eod_date_list' %}" class="btn btn-link">
                    <i class="fas fa-arrow-left me-1"></i>Back
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
