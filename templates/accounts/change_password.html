{% extends 'base.html' %}

{% block title %}Change Password{% endblock %}

{% block extra_css %}
<style>
:root {
    --brand: #0078D7;
    --brand-dark: #005BA1;
    --brand-light: #e3f2fd;
    --brand-gradient: linear-gradient(135deg, #0078D7 0%, #004E8C 100%);
    --rose: #ef4444;
    --s50: #f8fafc; --s100: #f1f5f9; --s200: #e2e8f0;
    --s400: #94a3b8; --s500: #64748b; --s600: #475569;
    --s700: #334155; --s800: #1e293b;
    --r: 16px; --rs: 10px;
    --sh2: 0 4px 14px rgba(0,0,0,.08);
}
* { box-sizing: border-box; }
.cp-container { max-width: 520px; margin: 0 auto; padding: .75rem 1rem; }

.cp-back {
    display: inline-flex; align-items: center; gap: .35rem;
    font-size: .85rem; font-weight: 600; color: var(--brand);
    text-decoration: none; margin-bottom: .6rem;
}
.cp-back:hover { text-decoration: underline; }

.cp-header {
    background: var(--brand-gradient);
    border-radius: var(--r) var(--r) 0 0;
    padding: 1.5rem 2rem;
    color: #fff;
}
.cp-header h1 { font-size: 1.3rem; font-weight: 800; margin: 0; }
.cp-header p { font-size: .85rem; opacity: .85; margin: .15rem 0 0; }

.cp-card {
    background: #fff; border-radius: 0 0 var(--r) var(--r);
    box-shadow: var(--sh2);
    padding: 2rem;
    margin-bottom: 1rem;
}

.cp-field { margin-bottom: 1.15rem; }
.cp-field label {
    display: block; font-size: .75rem; font-weight: 700;
    color: var(--s500); text-transform: uppercase;
    letter-spacing: .3px; margin-bottom: .3rem;
}
.cp-field input {
    width: 100%; padding: .6rem .85rem;
    border: 1.5px solid var(--s200);
    border-radius: var(--rs); font-size: .88rem;
    color: var(--s800); background: var(--s50);
    transition: border-color .2s, box-shadow .2s;
}
.cp-field input:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(0,120,215,.12);
    background: #fff;
}
.cp-hint {
    font-size: .7rem; color: var(--s400);
    margin-top: .25rem;
}

.cp-actions {
    display: flex; justify-content: flex-end; gap: .65rem;
    margin-top: 1.5rem; padding-top: 1.5rem;
    border-top: 1px solid var(--s100);
}
.cp-btn {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .6rem 1.25rem; border-radius: var(--rs);
    font-size: .85rem; font-weight: 700;
    border: none; cursor: pointer; transition: all .2s;
    text-decoration: none;
}
.cp-btn.primary { background: var(--brand); color: #fff; }
.cp-btn.primary:hover { background: var(--brand-dark); }
.cp-btn.secondary { background: var(--s100); color: var(--s600); }
.cp-btn.secondary:hover { background: var(--s200); text-decoration: none; color: var(--s700); }

@media (max-width: 576px) {
    .cp-container { padding: .35rem; }
    .cp-header { padding: 1rem 1.25rem; }
    .cp-card { padding: 1.25rem; }
    .cp-actions { flex-direction: column-reverse; }
    .cp-btn { justify-content: center; }
}
</style>
{% endblock %}

{% block content %}
<div class="cp-container">
    <a href="{% url 'accounts:profile' %}" class="cp-back">
        <i class="fas fa-arrow-left"></i> Back to Profile
    </a>

    <div class="cp-header">
        <h1><i class="fas fa-lock" style="margin-right:.5rem;font-size:1rem;"></i> Change Password</h1>
        <p>Enter your current password and choose a new one</p>
    </div>

    <div class="cp-card">
        <form method="post">
            {% csrf_token %}

            <div class="cp-field">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password"
                       placeholder="Enter current password" required autofocus>
            </div>

            <div class="cp-field">
                <label for="new_password1">New Password</label>
                <input type="password" id="new_password1" name="new_password1"
                       placeholder="Enter new password" required>
                <div class="cp-hint">Minimum 6 characters</div>
            </div>

            <div class="cp-field">
                <label for="new_password2">Confirm New Password</label>
                <input type="password" id="new_password2" name="new_password2"
                       placeholder="Re-enter new password" required>
            </div>

            <div class="cp-actions">
                <a href="{% url 'accounts:profile' %}" class="cp-btn secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
                <button type="submit" class="cp-btn primary">
                    <i class="fas fa-check"></i> Change Password
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
